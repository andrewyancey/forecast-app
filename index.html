<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current and Forecast Weather</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div class="header">
        <h1>Current Weather and Forecast</h1>
    </div>
    <div class="content-container">
        <form id="input-form">
            <h2>Enter your area code</h2>
            <input type="text" id="zip" />
            <input type="submit" value="Get Forecast">
        </form>
        <div>
            <div class="content-area">
                <div class="content-card">
                    <h2>Location Info</h2>
                    <div class="content-value">
                        <span>Latitude: </span>
                        <span id="lat"></span>
                    </div>
                    <div class="content-value">
                        <span>Longitude: </span>
                        <span id="long"></span>
                    </div>
                    <div class="content-value">
                        <span>City: </span>
                        <span id="city"></span>
                    </div>
                    <div class="content-value">
                        <span>State: </span>
                        <span id="state"></span>
                    </div>
                </div>
                <div class="content-card">
                    <h2>Current Weather</h2>
                    <div class="content-value">
                        <span>Temperature: </span>
                        <span id="temp"></span>
                        <span class="weather-unit">°F</span>
                    </div>
                    <div class="content-value">
                        <span>Humidity: </span>
                        <span id="humidity"></span>
                        <span class="weather-unit">%</span>
                    </div>
                    <div class="content-value">
                        <span>Pressure: </span>
                        <span id="pressure"></span>
                        <span class="weather-unit">mb</span>
                    </div>
                    <div class="content-value">
                        <span>Precipitation: </span>
                        <span id="precipitation"></span>
                        <span class="weather-unit">"</span>
                    </div>
                    <div class="content-value">
                        <span>Wind Speed: </span>
                        <span id="wind-speed"></span>
                        <span class="weather-unit">Knots</span>
                    </div>
                    <div class="content-value">
                        <span>Wind Direction: </span>
                        <span id="wind-direction"></span>
                        <span class="weather-unit">°</span>
                    </div>
                    <div class="content-value">
                        <span>Wind Gusts: </span>
                        <span id="wind-gusts"></span>
                        <span class="weather-unit">Knots</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./scripts/index.js"></script>
</body>

</html>
