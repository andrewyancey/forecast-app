<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current and Forecast Weather</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div class="header">
        <h1>Current Weather and Forecast</h1>
    </div>
    <div class="content-container">
        <form id="input-form">
            <h2>Enter your zip code</h2>
            <input type="text" id="zip" />
            <input type="submit" value="Get Forecast">
        </form>
        <div>
            <div class="results-panel">
                <div class="data-card">
                    <h2>Location Info</h2>
                    <div class="card-data-container">
                        <div class="data-col">
                            <div class="data-row">
                                <span>Latitude: </span>
                                <span id="lat"></span>
                            </div>
                            <div class="data-row">
                                <span>Longitude: </span>
                                <span id="long"></span>
                            </div>
                            <div class="data-row">
                                <span>City: </span>
                                <span id="city"></span>
                            </div>
                            <div class="data-row">
                                <span>State: </span>
                                <span id="state"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="data-card">
                    <h2>Current Weather</h2>
                    <div class="card-data-container">
                        <div class="data-col">
                            <div class="data-row">
                                <span>Temperature: </span>
                                <span id="temp"></span>
                                <span class="data-unit">°F</span>
                            </div>
                            <div class="data-row">
                                <span>Humidity: </span>
                                <span id="humidity"></span>
                                <span class="data-unit">%</span>
                            </div>
                            <div class="data-row">
                                <span>Pressure: </span>
                                <span id="pressure"></span>
                                <span class="data-unit">mb</span>
                            </div>
                            <div class="data-row">
                                <span>Precipitation: </span>
                                <span id="precipitation"></span>
                                <span class="data-unit">"</span>
                            </div>
                            <div class="data-row">
                                <span>Wind Speed: </span>
                                <span id="wind-speed"></span>
                                <span class="data-unit">Knots</span>
                            </div>
                            <div class="data-row">
                                <span>Wind Direction: </span>
                                <span id="wind-direction"></span>
                                <span class="data-unit">°</span>
                            </div>
                            <div class="data-row">
                                <span>Wind Gusts: </span>
                                <span id="wind-gusts"></span>
                                <span class="data-unit">Knots</span>
                            </div>
                        </div>
                        <div class="data-col">
                            <div class="data-row">
                                <span>Weather Code: </span>
                                <span id="weather-text"></span>
                            </div>
                            <div class="content-image">
                                <img src="./assets/svg-icons/wi-alien.svg" class="icon" id="weather-icon"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./scripts/index.js"></script>
</body>

</html>
